[colors]
background = #1E1E2E
background-alt = #44474A
#foreground = #CDD5F4
primary =#cba5f7
secondary =#b3befe 
alert = #FF5554
disabled = #44474A
text = #cdd6f4
subtext0 = #a6adc8
subtext1 = #bac2de
base = #1e1e2e
mantle = #181825
crust = #11111b

[settings]
screenchange-reload = true
pseudo-transparency = true

[bar/bar1]
width = 100%
height = 26pt
radius = 0
wm-restack = bspwm

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0pt

border-size = 0pt
border-bottom-size = 0pt

padding-left = 2 
padding-right = 2

module-margin = 1

font-0 = JetBrainsMono Nerd Font:size=12;2

modules-left = date time pulseaudio
modules-center = xworkspaces
modules-right = xkeyboard wlan memory battery systray 

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/systray]
type = internal/tray
tray-size = 60%
format-margin = 2pt
tray-spacing = 2pt

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
icon-default= "ůįĹ§"
format = <label-state>
format-background = ${colors.background}
format-foreground = ${colors.accent}
format-overline = ${colors.background}
format-underline = ${colors.background}
label-active = "ůįĹĘ"
label-active-background = ${colors.background}
label-active-padding = 1
label-occupied = "ÔÜí"
label-occupied-padding = 1
label-urgent = %icon%
label-urgent-padding = 1
label-empty = %icon%
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = "ÔĒõ  %instance%"

[module/pulseaudio]
type = internal/pulseaudio
interval = 5
format-volume-prefix-foreground = ${colors.primary}
format-volume =<ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted = "muted"
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = " ÔÄ¶ "
ramp-volume-1 = " ÔÄ¶ "
ramp-volume-2 = " ÔÄ¶ "
ramp-volume-3 = " ÔÄß "
ramp-volume-4 = " ÔÄß "
ramp-volume-5 = " ÔÄß "
ramp-volume-6 = " ÔÄ® "
ramp-volume-7 = " ÔÄ® "
ramp-volume-8 = " ÔÄ® "
ramp-volume-9 = " ÔÄ® "

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%
label-layout-foreground = ${colors.primary}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.primary}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2 
format = <label>
format-prefix = ÓČĪ
label = "  %{T5}%percentage_used%%"

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "cpu: "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1
date =%b-%d
label = %date%
format-prefix = "ÔĎē "

[module/time]
type = internal/date
interval = 1.0
time = %H:%M
label = %time%
format-prefix ="ÔÄó "

[network-base]
type = internal/network
format-connected-prefix = 
format-connected =   <label-connected>
format-disconnected = ůį§ģ 
interval = 5

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = ůį§®  %essid%
format-disconnected = ůį§ģ 
interval = 5

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %local_ip%

[module/battery]
type = internal/battery
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
label-charging = %percentage%%
label-discharging = %percentage%%

ramp-capacity-0 = "ÔČĄ " 
ramp-capacity-1 = "ÔČÉ " 
ramp-capacity-2 = "ÔČā " 
ramp-capacity-3 = "ÔČĀ " 
ramp-capacity-4 = "ÔČÄ " 

animation-charging-0 = "ÔČĄ " 
animation-charging-1 = "ÔČÉ " 
animation-charging-2 = "ÔČā " 
animation-charging-3 = "ÔČĀ " 
animation-charging-4 = "ÔČÄ " 
animation-charging-framerate = 750

animation-discharging-0 = "ÔČÄ " 
animation-discharging-1 = "ÔČĀ " 
animation-discharging-2 = "ÔČā " 
animation-discharging-3 = "ÔČÉ " 
animation-discharging-4 = "ÔČĄ " 
animation-discharging-framerate = 500

