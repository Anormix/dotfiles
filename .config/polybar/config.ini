[colors]
background = #1E1E2E
background-alt = #44474A
#foreground = #CDD5F4
primary =#cba5f7
secondary =#b3befe 
alert = #FF5554
disabled = #44474A

text = #cdd6f4
subtext0 = #a6adc8
subtext1 = #bac2de

base = #1e1e2e
mantle = #181825
crust = #11111b

[settings]
screenchange-reload = true
pseudo-transparency = true

[bar/bar1]
width = 99.8%
offset-x = 0.1%
height = 28pt
radius = 10
wm-restack = bspwm

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0pt

border-size = 6pt
border-color = 
border-bottom-size = 0pt

padding-left = 2
padding-right = 2

module-margin = 1

#separator = |
#separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=12;2

#modules-left = arch date cpu memory 
#modules-center = xworkspaces
#modules-right = xkeyboard pulseaudio systray 

modules-left = arch bspwm pulseaudio
modules-right = xkeyboard cpu memory date time systray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true


[module/arch]
type = custom/text
format = "ґ░гЗ"
click-left = "~/.config/rofi/shutdown.sh"
background = ${colors.text} 

[module/systray]
type = internal/tray
tray-size = 60%
format-margin = 2pt
tray-spacing = 2pt

[module/bspwm]
type = internal/xworkspaces
content-background = ${colors.crust}

label-active = %name%
label-active-foreground= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio
interval = 5

format-volume-prefix-foreground = ${colors.primary}
format-volume = <ramp-volume><label-volume>

label-volume = %percentage%%

label-muted = "muted"

label-muted-foreground = ${colors.disabled}

ramp-volume-0 = " яАж "
ramp-volume-1 = " яАж "
ramp-volume-2 = " яАж "
ramp-volume-3 = " яАз "
ramp-volume-4 = " яАз "
ramp-volume-5 = " яАз "
ramp-volume-6 = " яАи "
ramp-volume-7 = " яАи "
ramp-volume-8 = " яАи "
ramp-volume-9 = " яАи "

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.primary}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ram: " 
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "cpu: "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1
date =%b-%d
label = %date%
label-foreground = ${colors.primary}
format-prefix = "яСХ "

[module/time]
type = internal/date
interval = 1
date = "%I:%M %p"
format-prefix = "яАЧ "
label-foreground = ${colors.primary}

[network-base]
type = internal/network
format-connected-prefix = 
format-connected =   <label-connected>
format-disconnected = ґ░до 
interval = 5

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = ґ░ди  %essid%


[module/eth]
inherit = network-base
interface-type = wired
label-connected = %local_ip%

[module/battery]
type = internal/battery

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>

label-charging = %percentage%%
label-discharging = %percentage%%

ramp-capacity-0 = "яЙД " 
ramp-capacity-1 = "яЙГ " 
ramp-capacity-2 = "яЙВ " 
ramp-capacity-3 = "яЙБ " 
ramp-capacity-4 = "яЙА " 

animation-charging-0 = "яЙД " 
animation-charging-1 = "яЙГ " 
animation-charging-2 = "яЙВ " 
animation-charging-3 = "яЙБ " 
animation-charging-4 = "яЙА " 
animation-charging-framerate = 750

animation-discharging-0 = "яЙА " 
animation-discharging-1 = "яЙБ " 
animation-discharging-2 = "яЙВ " 
animation-discharging-3 = "яЙГ " 
animation-discharging-4 = "яЙД " 
animation-discharging-framerate = 500

; vim:ft=dosini
