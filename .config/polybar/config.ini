[colors]
background = #1E1E2E
background-alt = #44475A
foreground = #CDD6F4
primary =#cba6f7
secondary =#b4befe 
alert = #FF5555
disabled = #44475A

opened=

[settings]
screenchange-reload = true
pseudo-transparency = true

[bar/bar1]
width = 100%
height = 24pt
radius = 7
wm-restack = bspwm

#width = 90%
#offset-x = 5%

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0pt

border-size = 4pt
border-color = 
border-bottom-size = 0pt

padding-left = 2
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=12;2

modules-left = date cpu memory 
modules-center = xworkspaces
modules-right = xkeyboard pulseaudio systray 


cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true


[module/arch]
type = custom/text
format = "у°ЈҮ"

[module/systray]
type = internal/tray
tray-size = 70%
format-margin = 0pt
tray-spacing = 4pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-foreground= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix-foreground = ${colors.primary}
format-volume = <ramp-volume> <label-volume>

label-volume = %percentage%%

label-muted = "у°–Ғ"

label-muted-foreground = ${colors.disabled}

ramp-volume-0 = "у°•ҝ"
ramp-volume-1 = "у°–Җ"
ramp-volume-2 = "у°•ҫ"

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.primary}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ram " 
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "cpu "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
format-connected-prefix = 
format-connected =   <label-connected>
format-disconnected = у°Ө® 
interval = 5

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = у°ӨЁ  %essid%


[module/eth]
inherit = network-base
interface-type = wired
label-connected = %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/battery]
type = internal/battery

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>

label-charging = %percentage%%
label-discharging = %percentage%%

ramp-capacity-0 = "пү„ " 
ramp-capacity-1 = "пүғ " 
ramp-capacity-2 = "пүӮ " 
ramp-capacity-3 = "пүҒ " 
ramp-capacity-4 = "пүҖ " 

animation-charging-0 = "пү„ " 
animation-charging-1 = "пүғ " 
animation-charging-2 = "пүӮ " 
animation-charging-3 = "пүҒ " 
animation-charging-4 = "пүҖ " 
animation-charging-framerate = 750

animation-discharging-0 = "пүҖ " 
animation-discharging-1 = "пүҒ " 
animation-discharging-2 = "пүӮ " 
animation-discharging-3 = "пүғ " 
animation-discharging-4 = "пү„ " 
animation-discharging-framerate = 500

; vim:ft=dosini
